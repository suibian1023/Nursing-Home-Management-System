<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小东 · 智能助手 - 测试页面</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #f0f2f5;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
}

.chat-panel {
  width: 420px; height: 600px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}

.chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  background: linear-gradient(135deg, #4f7cff, #6c5ce7);
  color: #fff;
  flex-shrink: 0;
}
.chat-header h2 { font-size: 16px; font-weight: 600; }
.btn-close {
  width: 28px; height: 28px;
  border: none; background: rgba(255,255,255,.2);
  border-radius: 50%;
  color: #fff; font-size: 16px; line-height: 0;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.btn-close:hover { background: rgba(255,255,255,.35); }

.chat-messages {
  flex: 1; overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 3px; }

.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px; line-height: 1.6;
  word-break: break-word;
}
.msg.assistant {
  align-self: flex-start;
  background: #f4f6f8; color: #222;
  border-bottom-left-radius: 4px;
}
.msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #4f7cff, #6c5ce7);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.system {
  align-self: flex-start;
  background: #eef2ff; color: #3b3f5c;
  border-radius: 8px;
}

.msg.error-msg {
  align-self: flex-start;
  background: #fff2f0; color: #cf1322;
  border: 1px solid #ffccc7;
  border-radius: 8px;
  font-size: 13px;
}
.msg.error-msg .retry-link {
  color: #4f7cff; cursor: pointer; text-decoration: underline;
  margin-left: 6px;
}

.msg.assistant p { margin: 4px 0; }
.msg.assistant code {
  background: #e8e8e8; padding: 1px 5px; border-radius: 4px;
  font-size: 13px;
}
.msg.assistant pre {
  background: #1e1e1e; color: #d4d4d4;
  padding: 10px 14px; border-radius: 8px;
  overflow-x: auto; font-size: 13px; margin: 6px 0;
}
.msg.assistant pre code { background: none; padding: 0; color: inherit; }

.thinking-indicator {
  align-self: flex-start;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; font-size: 13px; color: #888;
}
.thinking-dots { display: flex; gap: 4px; }
.thinking-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: #bbb; animation: bounce 1.4s infinite ease-in-out both;
}
.thinking-dots span:nth-child(1) { animation-delay: -.32s; }
.thinking-dots span:nth-child(2) { animation-delay: -.16s; }
@keyframes bounce {
  0%,80%,100% { transform: scale(0); }
  40% { transform: scale(1); }
}

.chat-input-area {
  border-top: 1px solid #e8e8e8;
  padding: 12px 16px;
  display: flex; gap: 8px;
  flex-shrink: 0;
}
.chat-input-area textarea {
  flex: 1; resize: none;
  border: 1px solid #d9d9d9; border-radius: 8px;
  padding: 8px 12px; font-size: 14px; line-height: 1.5;
  outline: none; transition: border-color .2s;
  font-family: inherit; min-height: 40px; max-height: 100px;
}
.chat-input-area textarea:focus { border-color: #4f7cff; }
.chat-input-area textarea:disabled { background: #f5f5f5; cursor: not-allowed; }
.chat-input-area button {
  width: 64px; border: none; border-radius: 8px;
  background: #4f7cff; color: #fff; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: background .15s;
  flex-shrink: 0;
}
.chat-input-area button:hover { background: #3b5de7; }
.chat-input-area button:disabled { background: #b0b8d8; cursor: not-allowed; }
</style>
</head>
<body>

<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <h2>小东 · 智能助手</h2>
    <button class="btn-close" id="btnClose" title="关闭面板">&times;</button>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input-area">
    <textarea id="inputBox" placeholder="输入消息，Enter 发送 / Shift+Enter 换行" rows="1"></textarea>
    <button id="btnSend">发送</button>
  </div>
</div>

<script>
(function () {
  const messagesEl = document.getElementById('chatMessages');
  const inputEl = document.getElementById('inputBox');
  const btnSend = document.getElementById('btnSend');
  const btnClose = document.getElementById('btnClose');
  const chatPanel = document.getElementById('chatPanel');

  const API_BASE = 'http://localhost:3001/ai/api';
  const WELCOME_TEXT = '你好！我是小东，东软颐养中心的智能助手，有什么可以帮您的？';

  let history = [];
  let isStreaming = false;

  function addMessage(role, content) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (role === 'assistant') {
      div.innerHTML = marked.parse(content || '');
    } else {
      div.textContent = content;
    }
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addErrorMsg(text, failedMessage) {
    const div = document.createElement('div');
    div.className = 'msg error-msg';
    div.innerHTML = text + ' <span class="retry-link">点击重发</span>';
    div.querySelector('.retry-link').addEventListener('click', function () {
      div.remove();
      sendMessage(failedMessage);
    });
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function showThinking() {
    const div = document.createElement('div');
    div.className = 'thinking-indicator';
    div.id = 'thinkingIndicator';
    div.innerHTML = '思考中... <span class="thinking-dots"><span></span><span></span><span></span></span>';
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function removeThinking() {
    const el = document.getElementById('thinkingIndicator');
    if (el) el.remove();
  }

  function setInputDisabled(disabled) {
    inputEl.disabled = disabled;
    btnSend.disabled = disabled;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage(text) {
    if (isStreaming || !text.trim()) return;
    isStreaming = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    setInputDisabled(true);
    inputEl.value = '';
    showThinking();

    const assistantDiv = addMessage('assistant', '');
    let accumulated = '';

    try {
      const resp = await fetch(API_BASE + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history })
      });

      if (!resp.ok) {
        throw new Error('HTTP ' + resp.status);
      }

      removeThinking();

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const json = JSON.parse(line.slice(6));
              if (json.content) {
                accumulated += json.content;
                assistantDiv.innerHTML = marked.parse(accumulated);
                scrollToBottom();
              }
              if (json.done) {
                // stream complete
              }
            } catch (e) { /* skip malformed JSON */ }
          }
        }
      }

      if (accumulated) {
        history.push({ role: 'assistant', content: accumulated });
      }

    } catch (err) {
      removeThinking();
      assistantDiv.remove();
      history.pop(); // remove user message from history
      addErrorMsg('网络异常，消息发送失败。', text);
    } finally {
      isStreaming = false;
      setInputDisabled(false);
      inputEl.focus();
    }
  }

  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(inputEl.value);
    }
  });

  btnSend.addEventListener('click', function () {
    sendMessage(inputEl.value);
  });

  btnClose.addEventListener('click', function () {
    chatPanel.style.display = 'none';
  });

  // Init
  addMessage('system', WELCOME_TEXT);

})();
</script>

</body>
</html>
